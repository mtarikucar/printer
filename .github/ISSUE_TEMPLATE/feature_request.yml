---
name: Feature Request
description: Yeni bir özellik önerin
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Yeni özellik öneriniz için teşekkürler!
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivasyon
      description: Bu özellik hangi sorunu çözüyor?
      placeholder: Şu anda ... yapamıyorum çünkü ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Önerilen Çözüm
      description: Bu özelliğin nasıl çalışmasını istiyorsunuz?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatifler
      description: Düşündüğünüz alternatif çözümler
  - type: dropdown
    id: priority
    attributes:
      label: Öncelik
      options:
        - Acil
        - Yüksek
        - Orta
        - Düşük
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Alan
      options:
        - Frontend (Müşteri)
        - Frontend (Admin)
        - Frontend (Üretici)
        - Backend API
        - Ödeme Sistemi
        - 3D Model / Meshy
        - Veritabanı
        - CI/CD
        - Diğer
    validations:
      required: true
  - type: textarea
    id: mockup
    attributes:
      label: Mockup / Tasarım
      description: Varsa ekran tasarımı veya wireframe
