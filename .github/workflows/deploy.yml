name: Deploy Printer

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once — they share one VPS (git reset --hard, docker
# recreate, DB migrate) and would corrupt each other if interleaved. Queue the
# newest and let the running one finish.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # Quality gate — lint, type-check, production build and unit tests must pass
  # before we build/push images or touch the VPS. A red gate blocks the deploy.
  quality:
    name: Quality Gate (lint · types · build · tests)
    runs-on: ubuntu-latest
    env:
      # Dummies so env.ts + next build are happy without real secrets. env.ts
      # suppresses required-var throws during the build phase anyway.
      AUTH_SECRET: ci-build-only-secret-not-used-in-production-000
      ADMIN_EMAIL: ci@example.com
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_APP_URL: https://figurunica.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:unit

  build:
    name: Build & Push Images
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: app
          push: true
          tags: ${{ env.IMAGE_BASE }}/app:latest,${{ env.IMAGE_BASE }}/app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: worker
          push: true
          tags: ${{ env.IMAGE_BASE }}/worker:latest,${{ env.IMAGE_BASE }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_BASE: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
          # Public-facing config (managed in GitHub → upserted into server .env)
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          # Payment + bank secrets (managed in GitHub → upserted into server .env)
          PAYTR_MERCHANT_ID: ${{ secrets.PAYTR_MERCHANT_ID }}
          PAYTR_MERCHANT_KEY: ${{ secrets.PAYTR_MERCHANT_KEY }}
          PAYTR_MERCHANT_SALT: ${{ secrets.PAYTR_MERCHANT_SALT }}
          PAYTR_TEST_MODE: ${{ secrets.PAYTR_TEST_MODE }}
          PAYTR_TIMEOUT_MINUTES: ${{ secrets.PAYTR_TIMEOUT_MINUTES }}
          BANK_NAME: ${{ secrets.BANK_NAME }}
          BANK_ACCOUNT_HOLDER: ${{ secrets.BANK_ACCOUNT_HOLDER }}
          BANK_IBAN: ${{ secrets.BANK_IBAN }}
          BANK_BRANCH: ${{ secrets.BANK_BRANCH }}
          # Analytics & tracking (managed in GitHub → upserted into server .env)
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_GA4_ID: ${{ secrets.NEXT_PUBLIC_GA4_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          TIKTOK_PIXEL_ID: ${{ secrets.TIKTOK_PIXEL_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_BASE,IMAGE_TAG,NEXT_PUBLIC_APP_URL,SMTP_FROM,ADMIN_EMAIL,PAYTR_MERCHANT_ID,PAYTR_MERCHANT_KEY,PAYTR_MERCHANT_SALT,PAYTR_TEST_MODE,PAYTR_TIMEOUT_MINUTES,BANK_NAME,BANK_ACCOUNT_HOLDER,BANK_IBAN,BANK_BRANCH,NEXT_PUBLIC_GTM_ID,NEXT_PUBLIC_GA4_ID,META_PIXEL_ID,TIKTOK_PIXEL_ID,NEXT_PUBLIC_SENTRY_DSN
          script: |
            set -euo pipefail

            PROJECT_DIR="/root/projects/printer"
            COMPOSE_FILE="$PROJECT_DIR/docker/docker-compose.production.yml"
            ENV_FILE="$PROJECT_DIR/.env"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$PROJECT_DIR/backup_predeploy_${TIMESTAMP}.sql"

            log()  { echo "[DEPLOY] $1"; }
            warn() { echo "[WARN] $1"; }
            err()  { echo "[ERROR] $1"; exit 1; }

            cd "$PROJECT_DIR"

            # ─── 0. Git Pull (for compose file & env updates) ────────
            log "Son degisiklikler cekiliyor..."
            git fetch origin main
            git reset --hard origin/main
            log "Git pull tamamlandi. Commit: $(git rev-parse --short HEAD)"

            # ─── 0b. Sync managed env vars from GitHub Secrets ───────
            # Server's .env holds static infra config (DB_URL, REDIS_URL, ...);
            # this step upserts the GitHub-managed secrets so they stay in sync.
            # An empty secret is skipped (existing value preserved as safety net).
            if [ ! -f "$ENV_FILE" ]; then
                err ".env not found at $ENV_FILE — create it once manually with static infra settings before first deploy"
            fi

            upsert_env() {
                local key="$1"
                local value="$2"
                if [ -z "$value" ]; then
                    return 0
                fi
                # Drop any existing assignment (active or commented) then append fresh value.
                sed -i "/^${key}=/d" "$ENV_FILE"
                sed -i "/^#${key}=/d" "$ENV_FILE"
                printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
            }

            log "GitHub Secrets'tan .env senkronize ediliyor..."
            upsert_env NEXT_PUBLIC_APP_URL   "$NEXT_PUBLIC_APP_URL"
            upsert_env SMTP_FROM             "$SMTP_FROM"
            upsert_env ADMIN_EMAIL           "$ADMIN_EMAIL"
            upsert_env PAYTR_MERCHANT_ID     "$PAYTR_MERCHANT_ID"
            upsert_env PAYTR_MERCHANT_KEY    "$PAYTR_MERCHANT_KEY"
            upsert_env PAYTR_MERCHANT_SALT   "$PAYTR_MERCHANT_SALT"
            upsert_env PAYTR_TEST_MODE       "$PAYTR_TEST_MODE"
            upsert_env PAYTR_TIMEOUT_MINUTES "$PAYTR_TIMEOUT_MINUTES"
            upsert_env BANK_NAME             "$BANK_NAME"
            upsert_env BANK_ACCOUNT_HOLDER   "$BANK_ACCOUNT_HOLDER"
            upsert_env BANK_IBAN             "$BANK_IBAN"
            upsert_env BANK_BRANCH           "$BANK_BRANCH"
            # Analytics & tracking
            upsert_env NEXT_PUBLIC_GTM_ID    "$NEXT_PUBLIC_GTM_ID"
            upsert_env NEXT_PUBLIC_GA4_ID    "$NEXT_PUBLIC_GA4_ID"
            upsert_env META_PIXEL_ID         "$META_PIXEL_ID"
            upsert_env TIKTOK_PIXEL_ID       "$TIKTOK_PIXEL_ID"
            upsert_env NEXT_PUBLIC_SENTRY_DSN "$NEXT_PUBLIC_SENTRY_DSN"
            chmod 600 "$ENV_FILE"
            log ".env senkronize edildi (600 izinleri)."

            # ─── 1. Pre-deploy DB Backup ─────────────────────────────
            log "Veritabani yedegi aliniyor..."
            if docker ps --format '{{.Names}}' | grep -q printer_postgres; then
                docker exec printer_postgres pg_dump -U printer -d printer > "$BACKUP_FILE" 2>/dev/null && \
                    log "Yedek alindi: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))" || \
                    warn "Yedek alinamadi, devam ediliyor..."
            else
                warn "Postgres container calismiyor, yedek atlaniyor."
            fi

            # ─── 2. Login to GHCR & Pull images ─────────────────────
            # Pre-deploy disk cleanup
            log "Disk temizleniyor..."
            docker image prune -af --filter "until=12h" > /dev/null 2>&1 || true
            docker builder prune -af > /dev/null 2>&1 || true
            rm -f "$PROJECT_DIR"/backup_predeploy_*.sql 2>/dev/null || true
            log "Disk temizlendi: $(df -h / | tail -1 | awk '{ print $4 }') bos"
            log "Image'lar cekiliyor..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "${IMAGE_BASE}/app:${IMAGE_TAG}"
            docker pull "${IMAGE_BASE}/worker:${IMAGE_TAG}"
            docker tag "${IMAGE_BASE}/app:${IMAGE_TAG}" "${IMAGE_BASE}/app:latest"
            docker tag "${IMAGE_BASE}/worker:${IMAGE_TAG}" "${IMAGE_BASE}/worker:latest"
            log "Image'lar cekildi."

            # ─── 3. Keep DB & Redis running ──────────────────────────
            log "Postgres ve Redis kontrol ediliyor..."
            docker-compose -f "$COMPOSE_FILE" up -d postgres redis
            docker-compose -f "$COMPOSE_FILE" up -d --wait postgres redis 2>/dev/null || true

            # ─── 4. Run migration ────────────────────────────────────
            # One-time cutover to `drizzle-kit migrate`: if this DB has never been
            # baselined, bring it up to the full schema (idempotent, additive, no
            # data loss) and mark 0000_baseline as applied so `migrate` won't try
            # to recreate existing tables. Runs only on the first migrate-based
            # deploy; later deploys skip straight to migrate.
            if ! docker exec printer_postgres psql -U printer -d printer -tAc \
                 "SELECT 1 FROM drizzle.__drizzle_migrations LIMIT 1" 2>/dev/null | grep -q 1; then
                log "Ilk migrate-cutover: sema senkronize ediliyor + baseline..."
                docker exec -i printer_postgres psql -U printer -d printer -v ON_ERROR_STOP=1 \
                    < scripts/db/prod-sync-hotfix.sql
                docker exec -i printer_postgres psql -U printer -d printer -v ON_ERROR_STOP=1 \
                    < scripts/db/prod-baseline.sql
                log "Cutover tamamlandi (sema + baseline)."
            fi

            log "Veritabani migration calistiriliyor..."
            docker-compose -f "$COMPOSE_FILE" run --rm migrate

            # ─── 5. Restart app & worker with new images ─────────────
            log "Servisler guncelleniyor..."
            docker-compose -f "$COMPOSE_FILE" up -d --no-deps --force-recreate app worker

            # ─── 6. Health check ─────────────────────────────────────
            log "Saglik kontrolu yapiliyor..."
            for i in $(seq 1 15); do
                if curl -sf -o /dev/null http://localhost:3005; then
                    log "Uygulama calisiyor! http://localhost:3005"
                    break
                fi
                [ "$i" -eq 15 ] && err "Uygulama 15 deneme sonrasi yanit vermedi!"
                sleep 2
            done

            # ─── 7. Cleanup ──────────────────────────────────────────
            log "Eski image'lar temizleniyor..."
            docker image prune -f --filter "until=24h" > /dev/null 2>&1 || true

            # ─── Done ────────────────────────────────────────────────
            echo ""
            log "Deploy tamamlandi!"
            log "  App:    http://localhost:3005"
            log "  Commit: $(git rev-parse --short HEAD 2>/dev/null || echo 'N/A')"
            log "  Zaman:  $(date '+%Y-%m-%d %H:%M:%S')"
