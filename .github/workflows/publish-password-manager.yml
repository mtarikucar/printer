name: Publish password-manager MCP

# Publishes mcp/password-manager to npm. Trigger it either:
#   • manually — Actions tab → this workflow → "Run workflow" (works from mobile), or
#   • by pushing a tag like  pm-v1.0.1
#
# Requires a repository secret NPM_TOKEN containing an npm "Automation" token
# for an account that owns the @mtarikucar scope.
on:
  workflow_dispatch:
  push:
    tags:
      - "pm-v*.*.*"

jobs:
  publish:
    name: Build, test and publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/password-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      # `npm publish` re-runs build+test via prepublishOnly, then publishes.
      # publishConfig.access=public in package.json makes the scoped package public.
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
