# ─────────────────────────────────────────────────────────────────────────────
# Reference snippet — NOT auto-applied. The production reverse proxy (host nginx
# on the VPS in front of the app container at 127.0.0.1:3005) is managed OUTSIDE
# this repo. This file documents the ONE directive the proxy must carry.
#
# Why: the app accepts STL/OBJ print-file uploads up to 50 MB
# (UPLOAD_MODEL_MAX_SIZE_BYTES in src/lib/config/upload.ts). nginx's default
# `client_max_body_size` is 1 MB, so it rejects any upload over ~1 MB with
# HTTP 413 *before* the request ever reaches Next.js — the app never sees it.
# Symptom: "Dosya yüklenemedi … [HTTP 413]" on a perfectly valid 25 MB STL.
#
# Fix on the VPS: add the directive below to the figurunica server block (or
# globally in the http{} block), then `nginx -t && systemctl reload nginx`.
# 60m leaves headroom over the 50 MB app cap for multipart boundary overhead.
# Keep this in sync with UPLOAD_MODEL_MAX_SIZE_BYTES.
# ─────────────────────────────────────────────────────────────────────────────

server {
    server_name figurunica.com www.figurunica.com;

    # The line that fixes HTTP 413 on large model uploads:
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large uploads can take a while on slow connections.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ... your existing TLS (listen 443 ssl; ssl_certificate ...) lines stay as-is.
}
